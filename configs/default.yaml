# CloudSync 默认配置文件
# 复制到 ~/.cloudsync.yaml 或通过 --config 指定

# 同步任务配置
sync:
  - name: "default"
    local_path: "/path/to/sync"
    remote_prefix: "sync/"
    enabled: true

# 过滤规则
filter:
  ignore_file: ".syncignore"
  detect_swap: true

# 性能配置
performance:
  debounce_ms: 2000
  batch_interval_ms: 5000
  batch_max_size: 100
  max_concurrent: 3
  qps: 10

# 对象存储配置（建议使用环境变量）
# 环境变量：COS_SECRET_ID, COS_SECRET_KEY, COS_BUCKET, COS_REGION
cos:
  secret_id: ""
  secret_key: ""
  bucket: ""
  region: "ap-guangzhou"

# 日志配置
log:
  level: "info"
  format: "json"
  output: "cloudsync.log"
